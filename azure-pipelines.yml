trigger:
- main

variables:
  TF_VERSION: '1.5.0'
  WORKING_DIR: 'environments/dev'
  SERVICE_CONNECTION: 'terraform-azure-conn'

stages:

# ================= INIT =================
- stage: Init
  displayName: "Terraform Init"

  jobs:
  - job: InitJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)

# ================= PLAN =================
- stage: Plan
  displayName: "Terraform Plan"
  dependsOn: Init

  jobs:
  - job: PlanJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)

# ================= APPLY =================
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: succeeded()

  jobs:
  - job: ApplyJob
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(TF_VERSION)

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(WORKING_DIR)
        backendServiceArm: $(SERVICE_CONNECTION)